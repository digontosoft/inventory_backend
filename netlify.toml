[build]
  command   = "npm run build"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."api"]
  external_node_modules = ["pg", "pg-connection-string", "knex"]

# Redirect all /api/v1/* traffic to the serverless function
[[redirects]]
  from   = "/api/v1/*"
  to     = "/.netlify/functions/api/api/v1/:splat"
  status = 200
  force  = true
